server:
  addr: "0.0.0.0:8080"

code_runner:
  addr: ":8091"
  internal_token: "zeus-dev-code-runner-token"
  namespace: "default"
  default_timeout_seconds: 10
  max_output_bytes: 262144

postgres:
  host: localhost
  port: 5432
  user: zeus
  password: zeus
  database: zeus
  ssl_mode: disable
  time_zone: UTC
  max_open_conns: 10
  max_idle_conns: 5
  conn_max_lifetime: 30m

asset:
  meta_root: /Users/darin/mine/code/zeus/resources/zeus/assets

git:
  repo_root: /Users/darin/mine/code/zeus/resources/zeus/repos
  session_repo_root: /Users/darin/mine/code/zeus/resources/zeus/git-sessions
  bare_repo_root: /Users/darin/mine/code/zeus/resources/zeus/git
  repo_url_prefix: ""
  author_name: Zeus
  author_email: zeus@local
  default_branch: main

embedding:
  base_url: "http://localhost:11434"
  api_key: ""
  model_name: "nomic-embed-text:v1.5"

security:
  encryption_key: zeus-dev-key
  encryption_keys: []
  active_key_id: ""
  active_key_version: 0
