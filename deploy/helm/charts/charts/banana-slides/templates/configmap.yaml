apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "banana-slides.fullname" . }}
  labels:
    {{- include "banana-slides.labels" . | nindent 4 }}
data:
  nano-banana-api-url: {{ .Values.nanoBanana.apiUrl | quote }}
  {{- if .Values.templates.enabled }}
  templates-config: |
    {
      "presets": [
        {{- $first := true }}
        {{- range .Values.templates.presets }}
        {{- if not $first }},{{ end }}
        {{- $first = false }}
        {
          "id": {{ .id | quote }},
          "name": {{ .name | quote }},
          "description": {{ .description | quote }}
        }
        {{- end }}
      ]
    }
  {{- end }}
