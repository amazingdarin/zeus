apiVersion: v1
kind: Service
metadata:
  name: {{ include "rustfs.fullname" . }}
  labels:
    {{- include "rustfs.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: s3
      protocol: TCP
      name: s3
    {{- if .Values.service.consoleEnabled }}
    - port: {{ .Values.service.consolePort }}
      targetPort: console
      protocol: TCP
      name: console
    {{- end }}
  selector:
    app.kubernetes.io/name: {{ include "rustfs.name" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
