apiVersion: v1
kind: Service
metadata:
  name: {{ include "rustfs.fullname" . }}
  labels:
    {{- include "rustfs.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: s3
      protocol: TCP
      name: s3
      {{- if and (eq .Values.service.type "NodePort") .Values.service.nodePort }}
      nodePort: {{ .Values.service.nodePort }}
      {{- end }}
    {{- if .Values.service.consoleEnabled }}
    - port: {{ .Values.service.consolePort }}
      targetPort: console
      protocol: TCP
      name: console
      {{- if and (eq .Values.service.type "NodePort") .Values.service.consoleNodePort }}
      nodePort: {{ .Values.service.consoleNodePort }}
      {{- end }}
    {{- end }}
  selector:
    app.kubernetes.io/name: {{ include "rustfs.name" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
