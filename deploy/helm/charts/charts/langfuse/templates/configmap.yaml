{{- if .Values.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "langfuse.fullname" . }}-config
  labels:
    {{- include "langfuse.labels" . | nindent 4 }}
data:
  # NextAuth Configuration
  NEXTAUTH_URL: {{ .Values.auth.nextAuthUrl | quote }}
  
  # Database Configuration
  {{- if not .Values.database.url }}
  DATABASE_HOST: {{ .Values.database.host | quote }}
  DATABASE_PORT: {{ .Values.database.port | quote }}
  DATABASE_NAME: {{ .Values.database.name | quote }}
  {{- end }}
  
  # Redis Configuration
  {{- if .Values.redis.enabled }}
  REDIS_HOST: {{ .Values.redis.host | quote }}
  REDIS_PORT: {{ .Values.redis.port | quote }}
  {{- end }}
  
  # Object Storage Configuration
  {{- if .Values.objectStorage.enabled }}
  S3_ENDPOINT: {{ .Values.objectStorage.endpoint | quote }}
  S3_BUCKET_NAME: {{ .Values.objectStorage.bucket | quote }}
  S3_REGION: {{ .Values.objectStorage.region | quote }}
  {{- end }}
  
  # Feature Flags
  AUTH_DISABLE_SIGNUP: {{ .Values.features.authDisableSignup | quote }}
  
  {{- if .Values.features.authGoogle.enabled }}
  AUTH_GOOGLE_CLIENT_ID: {{ .Values.features.authGoogle.clientId | quote }}
  {{- end }}
  
  {{- if .Values.features.authGithub.enabled }}
  AUTH_GITHUB_CLIENT_ID: {{ .Values.features.authGithub.clientId | quote }}
  {{- end }}
  
  # Telemetry
  TELEMETRY_ENABLED: {{ .Values.telemetry.enabled | quote }}
  
  # Migration
  {{- if .Values.migration.runOnStartup }}
  LANGFUSE_AUTO_POSTGRES_MIGRATION_DISABLED: "false"
  {{- else }}
  LANGFUSE_AUTO_POSTGRES_MIGRATION_DISABLED: "true"
  {{- end }}
{{- end }}
