{{- if .Values.enabled }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "langfuse.fullname" . }}-secret
  labels:
    {{- include "langfuse.labels" . | nindent 4 }}
type: Opaque
stringData:
  # NextAuth Secrets
  NEXTAUTH_SECRET: {{ .Values.auth.nextAuthSecret | default (randAlphaNum 32) | quote }}
  SALT: {{ .Values.auth.salt | default (randAlphaNum 32) | quote }}
  
  # Database URL (constructed or provided)
  DATABASE_URL: {{ include "langfuse.databaseUrl" . | quote }}
  
  {{- if not .Values.database.url }}
  DATABASE_USER: {{ .Values.database.user | quote }}
  DATABASE_PASSWORD: {{ .Values.database.password | quote }}
  {{- end }}
  
  # Redis
  {{- if .Values.redis.enabled }}
  REDIS_CONNECTION_STRING: {{ include "langfuse.redisUrl" . | quote }}
  {{- if .Values.redis.password }}
  REDIS_PASSWORD: {{ .Values.redis.password | quote }}
  {{- end }}
  {{- end }}
  
  # Object Storage
  {{- if .Values.objectStorage.enabled }}
  S3_ACCESS_KEY_ID: {{ .Values.objectStorage.accessKeyId | quote }}
  S3_SECRET_ACCESS_KEY: {{ .Values.objectStorage.secretAccessKey | quote }}
  {{- end }}
  
  # OAuth Secrets
  {{- if .Values.features.authGoogle.enabled }}
  AUTH_GOOGLE_CLIENT_SECRET: {{ .Values.features.authGoogle.clientSecret | quote }}
  {{- end }}
  
  {{- if .Values.features.authGithub.enabled }}
  AUTH_GITHUB_CLIENT_SECRET: {{ .Values.features.authGithub.clientSecret | quote }}
  {{- end }}
{{- end }}
