postgres:
  service:
    type: ClusterIP
    port: 5432
  postgres:
    database: zeus
    user: zeus
    password: zeus
  persistence:
    enabled: true
    size: 10Gi

rustfs:
  service:
    type: ClusterIP
    port: 9000
    consolePort: 9001
    consoleEnabled: true
  auth:
    accessKey: zeus
    secretKey: zeus
  persistence:
    enabled: true
    size: 10Gi

faster-whisper:
  enabled: false
  image:
    repository: ghcr.io/fedirz/faster-whisper-server
    tag: latest-cpu
    pullPolicy: IfNotPresent
    pullSecrets: []
  replicaCount: 1
  service:
    type: ClusterIP
    port: 8000
    nodePort: null
  persistence:
    enabled: true
    size: 20Gi
    storageClassName: ""
    mountPath: /root/.cache/huggingface
  resources: {}
  command: []
  args: []
  extraEnv: []

global:
  hostNetwork: false

backend:
  enabled: true
  replicas: 1
  image:
    repository: zeus
    tag: latest
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 8080
    nodePort: null
  ingress:
    enabled: false
    className: ""
    hosts:
      - host: ""
        paths:
          - /
    tls: []
  resources: {}
  config: |
    server:
      addr: ":8080"

    postgres:
      host: postgres
      port: 5432
      user: zeus
      password: zeus
      database: zeus
      ssl_mode: disable
      time_zone: UTC
      max_open_conns: 10
      max_idle_conns: 5
      conn_max_lifetime: 30m

    object_storage:
      endpoint: http://rustfs:9000
      region: us-east-1
      access_key: zeus
      secret_key: zeus
      bucket: zeus-docs
      use_path_style: true
      insecure: true

    asset:
      meta_root: /var/lib/zeus/assets

    git:
      repo_root: /var/lib/zeus/repos
      session_repo_root: /var/lib/zeus/git-sessions
      bare_repo_root: /var/lib/zeus/git
      repo_url_prefix: ""
      author_name: Zeus
      author_email: zeus@local
      default_branch: main

    search:
      index_root: /var/lib/zeus/index

    security:
      encryption_key: zeus-dev-key
      encryption_keys: []
      active_key_id: ""
      active_key_version: 0

    providers:
      copilot:
        client_id: "Ov23liPsn9jEM8DUvp3I"
        scopes: []

frontend:
  enabled: true
  replicas: 1
  image:
    repository: zeus-web
    tag: latest
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 80
    nodePort: null
  ingress:
    enabled: false
    className: ""
    hosts:
      - host: ""
        paths:
          - /
    tls: []
  resources: {}
