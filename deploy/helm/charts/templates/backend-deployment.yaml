{{- if .Values.backend.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "zeus.fullname" . }}-backend
  labels:
    app.kubernetes.io/name: {{ include "zeus.name" . }}-backend
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  replicas: {{ .Values.backend.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "zeus.name" . }}-backend
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "zeus.name" . }}-backend
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      {{- if .Values.global.hostNetwork }}
      hostNetwork: true
      {{- end }}
      containers:
        - name: backend
          image: "{{ .Values.backend.image.repository }}:{{ .Values.backend.image.tag }}"
          imagePullPolicy: {{ .Values.backend.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.backend.service.port }}
          env:
            - name: ZEUS_PORT
              value: {{ .Values.backend.service.port | quote }}
            - name: ZEUS_CONFIG_PATH
              value: "/etc/zeus/config.yaml"
          volumeMounts:
            - name: config
              mountPath: /etc/zeus
              readOnly: true
          resources:
            {{- toYaml .Values.backend.resources | nindent 12 }}
      volumes:
        - name: config
          configMap:
            name: {{ include "zeus.fullname" . }}-backend-config
{{- end }}
