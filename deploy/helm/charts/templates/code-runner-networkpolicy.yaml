{{- if .Values.codeRunner.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "zeus.fullname" . }}-code-runner-ingress
  labels:
    app.kubernetes.io/name: {{ include "zeus.name" . }}-code-runner
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: {{ include "zeus.name" . }}-code-runner
      app.kubernetes.io/instance: {{ .Release.Name }}
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: {{ include "zeus.name" . }}-backend
              app.kubernetes.io/instance: {{ .Release.Name }}
      ports:
        - protocol: TCP
          port: {{ .Values.codeRunner.service.port }}
{{- end }}

