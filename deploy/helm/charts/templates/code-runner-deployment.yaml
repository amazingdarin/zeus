{{- if .Values.codeRunner.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "zeus.fullname" . }}-code-runner
  labels:
    app.kubernetes.io/name: {{ include "zeus.name" . }}-code-runner
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  replicas: {{ .Values.codeRunner.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "zeus.name" . }}-code-runner
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "zeus.name" . }}-code-runner
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      {{- if .Values.global.hostNetwork }}
      hostNetwork: true
      {{- end }}
      containers:
        - name: code-runner
          image: "{{ .Values.codeRunner.image.repository }}:{{ .Values.codeRunner.image.tag }}"
          imagePullPolicy: {{ .Values.codeRunner.image.pullPolicy }}
          command: ["/app/code-runner"]
          ports:
            - name: http
              containerPort: {{ .Values.codeRunner.service.port }}
          env:
            - name: ZEUS_CONFIG_PATH
              value: "/etc/zeus/config.yaml"
          volumeMounts:
            - name: config
              mountPath: /etc/zeus
              readOnly: true
          resources:
            {{- toYaml .Values.codeRunner.resources | nindent 12 }}
      volumes:
        - name: config
          configMap:
            name: {{ include "zeus.fullname" . }}-backend-config
{{- end }}

