apiVersion: v2
name: zeus
description: Zeus platform chart
type: application
version: 0.1.0
appVersion: "0.1.0"
dependencies:
  - name: postgres
    version: 0.1.0
    repository: "file://charts/postgres"
    condition: postgres.enabled
  - name: faster-whisper
    version: 0.1.0
    repository: "file://charts/faster-whisper"
    condition: faster-whisper.enabled
  - name: langfuse
    version: 1.0.0
    repository: "file://charts/langfuse"
    condition: langfuse.enabled
  - name: banana-slides
    version: 0.1.0
    repository: "file://charts/banana-slides"
    condition: banana-slides.enabled
