backend:
  enabled: true

frontend:
  enabled: true

langfuse:
  enabled: true
  database:
    host: "postgres"
    port: 5432
    name: "langfuse"
    user: "langfuse"
    password: "langfuse"
  auth:
    nextAuthSecret: "change-me-in-production-nextauth-secret"
    salt: "change-me-in-production-salt"
  service:
    type: ClusterIP
    port: 3000

# Banana Slides PPT Generation Service
banana-slides:
  enabled: true
  api:
    replicas: 1
  worker:
    replicas: 1
    gpu:
      enabled: false
  nanoBanana:
    apiUrl: "https://api.nanobanana.ai/v1"
    apiKey: "change-me-in-production"
  storage:
    enabled: true
    size: "10Gi"
  service:
    type: ClusterIP
    port: 8080

faster-whisper:
  enabled: true
