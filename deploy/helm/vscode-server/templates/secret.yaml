{{- if and (ne .Values.auth.mode "none") (not .Values.auth.existingSecret) }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "vscode-server.fullname" . }}
  labels:
    {{- include "vscode-server.labels" . | nindent 4 }}
type: Opaque
data:
  {{ .Values.auth.secretKey }}: {{ .Values.auth.password | b64enc | quote }}
{{- end }}
