# Values for the standalone `vscode-server` Helm chart on a k3s dev cluster.

replicaCount: 1

image:
  repository: ghcr.io/coder/code-server
  tag: "latest"
  pullPolicy: IfNotPresent
  pullSecrets: []

service:
  type: ClusterIP
  port: 8080

ingress:
  enabled: true
  className: traefik
  annotations: {}
  hosts:
    - host: vscode.dev.local
      paths:
        - path: /
          pathType: Prefix
  tls: []

persistence:
  enabled: true
  size: 10Gi
  storageClassName: local-path
  mountPath: /home/coder

auth:
  mode: password
  password: dev-password-change-in-production
